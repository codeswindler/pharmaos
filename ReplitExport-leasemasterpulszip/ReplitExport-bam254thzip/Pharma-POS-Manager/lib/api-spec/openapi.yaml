openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PharmaPOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog management
  - name: inventory
    description: Stock and warehouse management
  - name: customers
    description: Customer management
  - name: transactions
    description: Sales transactions
  - name: payments
    description: Payment processing
  - name: dashboard
    description: Dashboard KPIs and analytics
  - name: messages
    description: Bulk messaging

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Products
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List all product categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # Inventory
  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory with stock levels
      parameters:
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/{productId}/adjust:
    post:
      operationId: adjustStock
      tags: [inventory]
      summary: Adjust stock level for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustment"
      responses:
        "200":
          description: Adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  # Customers
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}/transactions:
    get:
      operationId: getCustomerTransactions
      tags: [customers]
      summary: Get transaction history for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  # Transactions / Checkout
  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, refunded, cancelled]
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a new transaction (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/recent:
    get:
      operationId: listRecentTransactions
      tags: [transactions]
      summary: List recent transactions (last 60 minutes) for payment confirmation
      responses:
        "200":
          description: Recent transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/confirm-payment:
    post:
      operationId: confirmPayment
      tags: [transactions]
      summary: Confirm payment and link to customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentConfirmation"
      responses:
        "200":
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/request-validation-code:
    post:
      operationId: requestValidationCode
      tags: [transactions]
      summary: Request a validation code for a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Validation code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationCodeResponse"

  /transactions/{id}/validate-code:
    post:
      operationId: validateTransactionCode
      tags: [transactions]
      summary: Validate a transaction using a code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeValidationInput"
      responses:
        "200":
          description: Validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/mpesa/initiate:
    post:
      operationId: initiateMpesa
      tags: [transactions]
      summary: Initiate M-PESA STK push for payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaInitiateInput"
      responses:
        "200":
          description: STK push initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaInitiateResponse"

  /transactions/mpesa/status/{checkoutRequestId}:
    get:
      operationId: pollMpesaStatus
      tags: [transactions]
      summary: Poll M-PESA payment status
      parameters:
        - name: checkoutRequestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaStatusResponse"

  /transactions/{id}/receipt:
    get:
      operationId: getReceipt
      tags: [transactions]
      summary: Get receipt data for a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  # Dashboard / Analytics
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue:
    get:
      operationId: getRevenueTrend
      tags: [dashboard]
      summary: Get revenue trend data for charts
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: week
      responses:
        "200":
          description: Revenue trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenuePeriod"

  /dashboard/low-stock:
    get:
      operationId: getLowStockAlerts
      tags: [dashboard]
      summary: Get products with low stock
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockAlert"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: week
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # Messaging
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List all message campaigns
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a bulk message to customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    get:
      operationId: getMessage
      tags: [messages]
      summary: Get a message campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required: [id, name, sku, price, stockQty, lowStockThreshold, category, unit, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        barcode:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        category:
          type: string
        price:
          type: number
        costPrice:
          type: ["number", "null"]
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        unit:
          type: string
        manufacturer:
          type: ["string", "null"]
        expiryDate:
          type: ["string", "null"]
        requiresPrescription:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, sku, price, category, unit]
      properties:
        name:
          type: string
        sku:
          type: string
        barcode:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: number
        costPrice:
          type: number
        stockQty:
          type: integer
          default: 0
        lowStockThreshold:
          type: integer
          default: 10
        unit:
          type: string
        manufacturer:
          type: string
        expiryDate:
          type: string
        requiresPrescription:
          type: boolean
          default: false

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        barcode:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: number
        costPrice:
          type: number
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        unit:
          type: string
        manufacturer:
          type: string
        expiryDate:
          type: string
        requiresPrescription:
          type: boolean
        isActive:
          type: boolean

    InventoryItem:
      type: object
      required: [productId, productName, sku, stockQty, lowStockThreshold, lastUpdated]
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        category:
          type: string
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        unit:
          type: string
        lastUpdated:
          type: string
        status:
          type: string
          enum: [ok, low, out]

    StockAdjustment:
      type: object
      required: [type, quantity]
      properties:
        type:
          type: string
          enum: [add, subtract, set]
        quantity:
          type: integer
        reason:
          type: string

    Customer:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        loyaltyPoints:
          type: integer
        totalSpend:
          type: number
        visitCount:
          type: integer
        createdAt:
          type: string
        lastVisit:
          type: ["string", "null"]

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string

    Transaction:
      type: object
      required: [id, totalAmount, status, paymentMethod, createdAt, items]
      properties:
        id:
          type: integer
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        totalAmount:
          type: number
        discountAmount:
          type: number
        taxAmount:
          type: number
        paidAmount:
          type: number
        changeAmount:
          type: number
        status:
          type: string
          enum: [pending, completed, refunded, cancelled]
        paymentMethod:
          type: string
          enum: [cash, card, mobile_money, other]
        referenceCode:
          type: ["string", "null"]
        validationCode:
          type: ["string", "null"]
        isValidated:
          type: boolean
        receiptPrinted:
          type: boolean
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"

    TransactionItem:
      type: object
      required: [productId, productName, quantity, unitPrice, totalPrice]
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number

    TransactionInput:
      type: object
      required: [items, paymentMethod, paidAmount]
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        paymentMethod:
          type: string
          enum: [cash, card, mobile_money, other]
        paidAmount:
          type: number
        discountAmount:
          type: number
          default: 0
        referenceCode:
          type: string

    CartItem:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer

    PaymentConfirmation:
      type: object
      required: [confirmed]
      properties:
        confirmed:
          type: boolean
        customerId:
          type: integer
        customerName:
          type: string

    ValidationCodeResponse:
      type: object
      required: [message, expiresIn]
      properties:
        message:
          type: string
        code:
          type: string
        expiresIn:
          type: integer

    CodeValidationInput:
      type: object
      required: [code]
      properties:
        code:
          type: string

    Receipt:
      type: object
      required: [transactionId, items, totalAmount, paidAmount, changeAmount, paymentMethod, createdAt]
      properties:
        transactionId:
          type: integer
        storeName:
          type: string
        storeAddress:
          type: string
        storePhone:
          type: string
        cashierName:
          type: string
        customerName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
        subtotal:
          type: number
        discountAmount:
          type: number
        taxAmount:
          type: number
        totalAmount:
          type: number
        paidAmount:
          type: number
        changeAmount:
          type: number
        paymentMethod:
          type: string
        referenceCode:
          type: ["string", "null"]
        createdAt:
          type: string

    DashboardSummary:
      type: object
      required: [todayRevenue, weekRevenue, monthRevenue, todayTransactions, totalProducts, lowStockCount, outOfStockCount, totalCustomers]
      properties:
        todayRevenue:
          type: number
        todayRevenueChange:
          type: number
        weekRevenue:
          type: number
        weekRevenueChange:
          type: number
        monthRevenue:
          type: number
        todayTransactions:
          type: integer
        todayTransactionsChange:
          type: number
        totalProducts:
          type: integer
        lowStockCount:
          type: integer
        outOfStockCount:
          type: integer
        totalCustomers:
          type: integer
        avgTransactionValue:
          type: number

    RevenuePeriod:
      type: object
      required: [label, revenue, transactions]
      properties:
        label:
          type: string
        revenue:
          type: number
        transactions:
          type: integer

    LowStockAlert:
      type: object
      required: [productId, productName, sku, stockQty, lowStockThreshold, status]
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        category:
          type: string
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        status:
          type: string
          enum: [low, out]

    TopProduct:
      type: object
      required: [productId, productName, totalSold, totalRevenue]
      properties:
        productId:
          type: integer
        productName:
          type: string
        category:
          type: string
        totalSold:
          type: integer
        totalRevenue:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [sale, stock_update, new_customer, message_sent, low_stock]
        description:
          type: string
        amount:
          type: ["number", "null"]
        timestamp:
          type: string

    MpesaInitiateInput:
      type: object
      required: [phone, amount, cartItems]
      properties:
        phone:
          type: string
        amount:
          type: number
        customerName:
          type: string
        cartItems:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        discountAmount:
          type: number

    MpesaInitiateResponse:
      type: object
      required: [checkoutRequestId, message]
      properties:
        checkoutRequestId:
          type: string
        message:
          type: string

    MpesaStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, completed, failed, timeout]
        transactionId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        amount:
          type: ["number", "null"]
        mpesaCode:
          type: ["string", "null"]
        message:
          type: string

    Message:
      type: object
      required: [id, title, content, recipientCount, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        recipientType:
          type: string
          enum: [all, loyalty, inactive, custom]
        recipientCount:
          type: integer
        status:
          type: string
          enum: [draft, sent, scheduled]
        scheduledAt:
          type: ["string", "null"]
        sentAt:
          type: ["string", "null"]
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [title, content, recipientType]
      properties:
        title:
          type: string
        content:
          type: string
        recipientType:
          type: string
          enum: [all, loyalty, inactive, custom]
        recipientIds:
          type: array
          items:
            type: integer
        scheduledAt:
          type: string
