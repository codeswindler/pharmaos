openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PharmaPOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
    description: Staff authentication
  - name: admin
    description: Super-admin pharmacy management
  - name: health
    description: Health operations
  - name: products
    description: Product catalog management
  - name: inventory
    description: Stock and warehouse management
  - name: customers
    description: Customer management
  - name: checkouts
    description: Sale baskets and lifecycle
  - name: payments
    description: Independent cash and M-PESA payment ledger
  - name: staff
    description: Pharmacy staff management
  - name: dashboard
    description: Dashboard KPIs and analytics
  - name: messages
    description: Bulk messaging

paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login using email or phone plus password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the authenticated user and pharmacy
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"

  /admin/pharmacies:
    get:
      operationId: listAdminPharmacies
      tags: [admin]
      summary: List all pharmacies
      responses:
        "200":
          description: Pharmacies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPharmacy"
    post:
      operationId: createPharmacy
      tags: [admin]
      summary: Create a pharmacy and its owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PharmacyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePharmacyResponse"

  /admin/pharmacies/{id}:
    put:
      operationId: updatePharmacy
      tags: [admin]
      summary: Update a pharmacy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PharmacyUpdate"
      responses:
        "200":
          description: Updated pharmacy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pharmacy"
    delete:
      operationId: suspendPharmacy
      tags: [admin]
      summary: Suspend a pharmacy and its staff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/pharmacies/{id}/mpesa:
    put:
      operationId: configurePharmacyMpesa
      tags: [admin]
      summary: Store encrypted M-PESA credentials for a pharmacy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaConfigInput"
      responses:
        "200":
          description: Configuration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaConfigResponse"

  /admin/pharmacies/{id}/mpesa/test:
    post:
      operationId: testPharmacyMpesa
      tags: [admin]
      summary: Test a pharmacy's M-PESA credentials
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Credentials verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/pharmacies/{id}/mpesa/register-callbacks:
    post:
      operationId: registerPharmacyMpesaCallbacks
      tags: [admin]
      summary: Register C2B confirmation and validation callback URLs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Callbacks registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform pharmacy statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Products
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List all product categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # Inventory
  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory with stock levels
      parameters:
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/{productId}/adjust:
    post:
      operationId: adjustStock
      tags: [inventory]
      summary: Adjust stock level for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustment"
      responses:
        "200":
          description: Adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  # Checkouts
  /checkouts:
    get:
      operationId: listCheckouts
      tags: [checkouts]
      summary: List pharmacy checkouts
      responses:
        "200":
          description: Checkouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckoutSummary"
    post:
      operationId: createCheckout
      tags: [checkouts]
      summary: Create a checkout and reserve stock for 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"

  /checkouts/{id}:
    get:
      operationId: getCheckout
      tags: [checkouts]
      summary: Get checkout with items and attached payments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"

  /checkouts/expire:
    post:
      operationId: expireCheckouts
      tags: [checkouts]
      summary: Expire stale open checkouts and release their stock reservations
      responses:
        "200":
          description: Expiry result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpireResponse"

  /checkouts/{id}/cancel:
    post:
      operationId: cancelCheckout
      tags: [checkouts]
      summary: Cancel an unpaid checkout and release stock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"

  /checkouts/{id}/void:
    post:
      operationId: voidCheckout
      tags: [checkouts]
      summary: Manager void with refund-required payments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Voided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkout"

  /checkouts/{id}/receipt:
    get:
      operationId: getCheckoutReceipt
      tags: [checkouts]
      summary: Get checkout receipt with all attached payments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  # Payments
  /payments/cash:
    post:
      operationId: attachCashPayment
      tags: [payments]
      summary: Attach cash to an open checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashPaymentInput"
      responses:
        "201":
          description: Attached payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/unmatched:
    get:
      operationId: listUnmatchedPayments
      tags: [payments]
      summary: List suggested unmatched M-PESA payments for an open checkout
      parameters:
        - name: checkoutId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unmatched payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /payments/{id}/attach:
    post:
      operationId: attachMpesaPayment
      tags: [payments]
      summary: Cashier-confirm and attach an unmatched M-PESA payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachPaymentInput"
      responses:
        "200":
          description: Attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /payments/mpesa/initiate:
    post:
      operationId: initiateMpesaPayment
      tags: [payments]
      summary: Initiate an M-PESA STK Push for an open checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaInitiateInput"
      responses:
        "200":
          description: STK Push initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaInitiateResponse"

  /payments/events:
    get:
      operationId: streamPaymentEvents
      tags: [payments]
      summary: Stream persisted-ledger payment arrival notifications
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string

  /payments/mpesa/c2b/{token}/validation:
    post:
      operationId: validateC2bPayment
      tags: [payments]
      summary: Safaricom C2B validation callback
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaCallbackPayload"
      responses:
        "200":
          description: Validation response

  /payments/mpesa/c2b/{token}/confirmation:
    post:
      operationId: confirmC2bPayment
      tags: [payments]
      summary: Idempotent Safaricom C2B confirmation callback
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaCallbackPayload"
      responses:
        "200":
          description: Confirmation accepted

  /payments/mpesa/stk/{token}/callback:
    post:
      operationId: receiveStkCallback
      tags: [payments]
      summary: Idempotent M-PESA Express result callback
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaCallbackPayload"
      responses:
        "200":
          description: Callback accepted

  # Staff
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List staff in the current pharmacy
      responses:
        "200":
          description: Staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaffMember
      tags: [staff]
      summary: Create a pharmacy staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"

  /staff/{id}:
    patch:
      operationId: updateStaffMember
      tags: [staff]
      summary: Update a pharmacy staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Dashboard / Analytics
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue:
    get:
      operationId: getRevenueTrend
      tags: [dashboard]
      summary: Get revenue trend data for charts
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: week
      responses:
        "200":
          description: Revenue trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenuePeriod"

  /dashboard/low-stock:
    get:
      operationId: getLowStockAlerts
      tags: [dashboard]
      summary: Get products with low stock
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockAlert"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: week
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # Messaging
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List all message campaigns
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a bulk message to customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    get:
      operationId: getMessage
      tags: [messages]
      summary: Get a message campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/summary:
    get:
      operationId: getSmsSummary
      tags: [messages]
      summary: Get SMS wallet, rate, gateway, and sales-contact summary
      responses:
        "200":
          description: SMS summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsSummary"

  /messages/recipients/estimate:
    get:
      operationId: estimateMessageRecipients
      tags: [messages]
      summary: Count unique M-PESA contacts from completed sales
      parameters:
        - name: recipientType
          in: query
          required: true
          schema:
            type: string
            enum: [all, this_week, range]
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Recipient estimate
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer

  /messages/quote:
    post:
      operationId: quoteMessageCampaign
      tags: [messages]
      summary: Quote a sales-contact SMS campaign before billing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageQuoteInput"
      responses:
        "200":
          description: SMS campaign quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageQuote"

  /messages/{id}/recipients:
    get:
      operationId: listMessageRecipients
      tags: [messages]
      summary: List per-recipient provider and delivery states
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message recipients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageRecipient"

  /messages/{id}/refresh-status:
    post:
      operationId: refreshMessageStatus
      tags: [messages]
      summary: Fetch unresolved delivery states from the configured gateway
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/wallet/top-up:
    post:
      operationId: requestSmsWalletTopUp
      tags: [messages]
      summary: Request an SMS wallet top-up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmsWalletTopUpInput"
      responses:
        "202":
          description: Top-up requested

  /messages/dlr/{token}:
    post:
      operationId: receiveSmsDlr
      tags: [messages]
      summary: Receive a provider delivery callback
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmsDlrPayload"
      responses:
        "200":
          description: Callback accepted

  /messages/transactional-hashed:
    post:
      operationId: sendTransactionalHashedSms
      tags: [messages]
      summary: Send a transactional SMS to a Safaricom hashed number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionalHashedSmsInput"
      responses:
        "201":
          description: Transactional SMS accepted

components:
  schemas:
    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, name, email, phone, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [super_admin, pharmacy_owner, manager, cashier]
        pharmacyId:
          type: ["integer", "null"]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
        pharmacy:
          oneOf:
            - $ref: "#/components/schemas/Pharmacy"
            - type: "null"

    AuthMeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        pharmacy:
          oneOf:
            - $ref: "#/components/schemas/Pharmacy"
            - type: "null"

    PharmacyInput:
      type: object
      required: [name, ownerName, ownerEmail, ownerPhone, ownerPassword]
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        planType:
          type: string
        planValue:
          type: number
        ownerName:
          type: string
        ownerEmail:
          type: string
        ownerPhone:
          type: string
        ownerPassword:
          type: string

    PharmacyUpdate:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        planType:
          type: string
        planValue:
          type: number
        status:
          type: string

    CreatePharmacyResponse:
      type: object
      required: [pharmacyId, ownerId]
      properties:
        pharmacyId:
          type: integer
        ownerId:
          type: integer

    MpesaConfig:
      type: object
      required: [environment, shortcode, transactionType, enabled, registrationStatus]
      properties:
        environment:
          type: string
          enum: [sandbox, production]
        shortcode:
          type: string
        transactionType:
          type: string
          enum: [CustomerPayBillOnline, CustomerBuyGoodsOnline]
        enabled:
          type: boolean
        consumerKey:
          type: string
