kind = "web"
previewPath = "/"
title = "PharmaPOS"
version = "1.0.0"
id = "artifacts/pharma-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20635

[services.development]
run = "pnpm --filter @workspace/pharma-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharma-pos", "run", "build" ]
publicDir = "artifacts/pharma-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20635"
BASE_PATH = "/"
